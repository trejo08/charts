apiVersion: v1
entries:
  marble:
  - annotations:
      artifacthub.io/category: security
      artifacthub.io/changes: |
        - kind: changed
          description: "jwtSigningKeyProperty only required when remote secret key name differs from default JWT_SIGNING_KEY_B64"
        - kind: changed
          description: "AUTHENTICATION_JWT_SIGNING_KEY_FILE injected via env[] only when jwtSigningKeyProperty is set; env[] takes precedence over envFrom"
        - kind: added
          description: "marble.validateSecrets gate — fails at render time if secret configuration is incomplete"
        - kind: added
          description: "ArtifactHub support: artifacthub-repo.yml, LICENSE, Chart.yaml annotations, gh-pages publish step"
      artifacthub.io/images: |
        - name: marble-backend
          image: europe-west1-docker.pkg.dev/marble-infra/marble/marble-backend:v1.1.0
        - name: marble-frontend
          image: europe-west1-docker.pkg.dev/marble-infra/marble/marble-frontend:v1.1.1
      artifacthub.io/license: MIT
      artifacthub.io/links: |
        - name: Marble Documentation
          url: https://docs.checkmarble.com
        - name: Marble GitHub
          url: https://github.com/checkmarble/marble
