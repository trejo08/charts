      artifacthub.io/changes: |
        - kind: added
          description: "jwtSigningKeyProperty — configurable key name in remote secret for base64-encoded RSA PEM"
        - kind: added
          description: "Second ExternalSecret (<release>-secrets-jwt) with decodingStrategy: Base64 for JWT key"
        - kind: fixed
          description: "RSA private key PEM with literal newlines breaking JSON in AWS Secrets Manager"
        - kind: changed
          description: "JWT volume now references <release>-secrets-jwt secret with jwt.pem key"
