name: Release Charts

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to OCI
        run: |
          VERSION=$(grep '^version:' charts/marble/Chart.yaml | awk '{print $2}')
          helm package charts/marble
          helm push marble-${VERSION}.tgz oci://ghcr.io/trejo08/charts

      - name: Publish artifacthub-repo.yml to gh-pages
        run: |
          git fetch origin gh-pages
          git show main:artifacthub-repo.yml > "$RUNNER_TEMP/artifacthub-repo.yml"
          git checkout gh-pages
          cp "$RUNNER_TEMP/artifacthub-repo.yml" artifacthub-repo.yml
          git add artifacthub-repo.yml
          git diff --cached --quiet || git commit -m "chore: update artifacthub-repo.yml"
          git push origin gh-pages
          git checkout main
