{{- if .Values.ingress.enabled }}
{{- $fullname := include "marble.fullname" . }}
{{- $labels := include "marble.labels" . }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-frontend
  namespace: {{ include "marble.namespace" . }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.frontend.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.frontend.hostname }}
      secretName: {{ .Values.ingress.frontend.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.frontend.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-frontend
                port:
                  name: http
{{- if .Values.ingress.api.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-api
  namespace: {{ include "marble.namespace" . }}
  labels:
    {{- $labels | nindent 4 }}
    app.kubernetes.io/component: api
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.api.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.api.hostname }}
      secretName: {{ .Values.ingress.api.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.api.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-api
                port:
                  name: http
{{- end }}
{{- end }}
