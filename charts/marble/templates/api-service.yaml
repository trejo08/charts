apiVersion: v1
kind: Service
metadata:
  name: {{ include "marble.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "marble.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "marble.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
